name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo blog
        working-directory: blog
        run: hugo --minify

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/blog
          # Important: .nojekyll must be at the artifact root
          touch _deploy/.nojekyll
          # Copy portfolio home page
          cp index.html _deploy/index.html
          # Copy Hugo output into blog/ subdirectory
          rsync -av blog/public/ _deploy/blog/
          echo "=== Final _deploy layout ==="
          find _deploy -name "*.html" | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
