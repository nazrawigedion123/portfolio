name: Deploy to GitHub Pages

on:
  push:
    branches: [main, hugo]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Configure deploy path
        run: |
          if [ "${GITHUB_REF_NAME}" = "hugo" ]; then
            echo "HUGO_BASE_URL=https://nazrawigedion123.github.io/portfolio/test/" >> "$GITHUB_ENV"
            echo "HUGO_DEPLOY_PATH=test" >> "$GITHUB_ENV"
          else
            echo "HUGO_BASE_URL=https://nazrawigedion123.github.io/portfolio/blog/" >> "$GITHUB_ENV"
            echo "HUGO_DEPLOY_PATH=blog" >> "$GITHUB_ENV"
          fi

      - name: Build Hugo blog
        working-directory: blog
        run: hugo --minify --baseURL "$HUGO_BASE_URL"

      - name: Prepare deploy directory
        run: |
          mkdir -p "_deploy/$HUGO_DEPLOY_PATH"
          touch _deploy/.nojekyll
          cp index.html _deploy/index.html
          rsync -av blog/public/ "_deploy/$HUGO_DEPLOY_PATH/"
          echo "=== Final _deploy layout ==="
          find _deploy -name "*.html" | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
