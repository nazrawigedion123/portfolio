{{ define "main" }}
<header>
    <h1>{{ .Site.Title }}</h1>
    <p class="subtitle">_deep_dives_into_engineering</p>
</header>

<main>
    {{ range .Paginator.Pages }}
    <a href="{{ .RelPermalink }}" class="post-link">
        <div class="card post-card">
            <h3>{{ .Title }}</h3>
            <p>{{ .Description }}</p>
            <div class="tag-container">
                {{ range .Params.tags }}
                <span class="tag">{{ . }}</span>
                {{ end }}
            </div>
            <p style="margin-top: 16px; font-size: 0.8rem; color: var(--text-muted);">{{ .Date.Format "Jan 2, 2006" }}</p>
        </div>
    </a>
    {{ end }}
</main>
{{ end }}
